name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint (all events) ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Lint (prettier + eslint + stylelint + typecheck + knip)
        run: npm run lint

  # ── Security: Secret Detection (all events) ────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Test (PR only) ─────────────────────────────────────────────────
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Vitest
        run: npm run test

  # ── Rust: fmt + clippy + test + build smoke (PR only) ──────────────
  rust:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Rust fmt check
        run: npm run rust:fmt

      - name: Build frontend (required for Rust compilation)
        run: npm run build

      - name: Clippy
        run: npm run rust:_clippy

      - name: Cargo test
        run: npm run rust:_test

      - name: Tauri build smoke test
        run: npm run tauri build -- --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

  # ── CI Gate ────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [lint, security, test, rust]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        env:
          LINT: ${{ needs.lint.result }}
          SECURITY: ${{ needs.security.result }}
          TEST: ${{ needs.test.result }}
          RUST: ${{ needs.rust.result }}
        run: |
          for r in "$LINT" "$SECURITY" "$TEST" "$RUST"; do
            [[ "$r" =~ ^(success|skipped)$ ]] || { echo "Failed: $r"; exit 1; }
          done
          echo "All checks passed."
