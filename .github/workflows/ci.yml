name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Path Filtering ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '*.config.*'
            rust:
              - 'src-tauri/**'

  # ── Frontend: Lint + Type Check ─────────────────────────────────
  lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Prettier
        run: npx prettier --check 'src/**/*.{ts,tsx,css}'
      - name: ESLint
        run: npx eslint src/ --max-warnings=0
      - name: Stylelint
        run: npx stylelint 'src/**/*.css'
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Knip (dead code)
        run: npx knip --reporter compact

  # ── Frontend: Test ──────────────────────────────────────────────
  test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Vitest
        run: npx vitest run

  # ── Rust: Check + Test ──────────────────────────────────────────
  rust-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Build frontend (needed by generate_context macro)
        uses: ./.github/actions/setup-node
      - run: npm run build

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

  # ── Security: Secret Detection ──────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
