name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      release:
        description: 'Set by release.yml — enables release-only steps (build smoke test)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  # Only PRs cancel superseded runs. NOTE: github.event_name is NEVER
  # 'workflow_call' in a called workflow (the caller's event propagates),
  # so the old `!= 'workflow_call'` condition was always true.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  TZ: Asia/Seoul

jobs:
  # ── Path Change Detection ────────────────────────────────────────
  # PR: paths-filter decides whether the rust job must run.
  # Everything else (main push, release call): decide outputs true,
  # so rust always runs.
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.decide.outputs.rust }}
    steps:
      # No checkout: paths-filter reads PR changes via the API.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - 'rust-toolchain*'
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-node/**'
      - name: Determine rust job necessity
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=${{ steps.filter.outputs.rust }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Lint (all events) ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node
      - name: Lint (prettier + eslint + stylelint + typecheck + knip)
        run: npm run lint

  # ── Security: Secret Detection (all events) ────────────────────────
  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks
        # NOTE: curl-pinned installs are invisible to Dependabot —
        # bump the version and checksum together, by hand.
        run: |
          GITLEAKS_VERSION="v8.30.1"
          EXPECTED_SHA="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          echo "${EXPECTED_SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin -f gitleaks.tar.gz
          rm gitleaks.tar.gz
      - name: Run gitleaks (PR — changed commits only)
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --log-opts "$BASE..$HEAD"
      - name: Run gitleaks (full history)
        if: github.event_name != 'pull_request'
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  # ── Dependency licenses & supply chain (cargo-deny) ────────────────
  deny:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-deny
      - name: cargo-deny (licenses, bans, sources)
        working-directory: src-tauri
        run: cargo deny check licenses bans sources

  # ── Test (all events) ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node
      - name: Vitest
        run: npm run test

  # ── Rust: fmt + clippy + test + build smoke ────────────────────────
  rust:
    needs: [changes]
    # Runs only when changes succeeded AND said rust is needed
    # (main push / release call: decide always outputs true).
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Pin must be a master-history SHA (release-branch SHAs can be GC'd);
      # the toolchain is selected via the input, not the ref name.
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Rust fmt check
        run: npm run rust:fmt

      - name: Build frontend (required for Rust compilation)
        run: npm run build

      - name: Clippy
        run: npm run rust:_clippy

      - name: Cargo test
        run: npm run rust:_test

      - name: Tauri build smoke test (release only)
        # github.event_name is NEVER 'workflow_call' inside a called workflow —
        # the caller's event propagates — so release.yml passes an input instead.
        if: inputs.release == true
        run: npm run tauri build -- --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

  # ── CI Gate ────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [changes, lint, security, deny, test, rust]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify all jobs passed
        env:
          EVENT: ${{ github.event_name }}
          CHANGES: ${{ needs.changes.result }}
          RUST_NEEDED: ${{ needs.changes.outputs.rust }}
          LINT: ${{ needs.lint.result }}
          SECURITY: ${{ needs.security.result }}
          DENY: ${{ needs.deny.result }}
          TEST: ${{ needs.test.result }}
          RUST: ${{ needs.rust.result }}
        run: |
          fail() { echo "::error::$1"; exit 1; }
          # These must succeed on every event — a skip here means something
          # upstream broke, not an intended skip.
          [[ "$CHANGES"  == "success" ]] || fail "changes: $CHANGES"
          [[ "$LINT"     == "success" ]] || fail "lint: $LINT"
          [[ "$SECURITY" == "success" ]] || fail "security: $SECURITY"
          [[ "$DENY"     == "success" ]] || fail "deny: $DENY"
          [[ "$TEST"     == "success" ]] || fail "test: $TEST"
          # rust must succeed everywhere, with exactly one legitimate skip:
          # a PR whose changes touched no rust-related paths.
          if [[ "$RUST" != "success" ]]; then
            [[ "$EVENT" == "pull_request" && "$RUST_NEEDED" == "false" && "$RUST" == "skipped" ]] \
              || fail "rust: $RUST (event=$EVENT, rust-needed=$RUST_NEEDED)"
          fi
          echo "All checks passed."
