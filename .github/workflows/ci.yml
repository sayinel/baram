name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TZ: Asia/Seoul

jobs:
  # ── Path Change Detection ────────────────────────────────────────
  # On PR: detects if Rust-related files changed to skip rust job.
  # On push/workflow_call: filter steps are skipped, decide step
  # defaults to 'true' so rust job always runs when needed.
  changes:
    runs-on: ubuntu-22.04
    outputs:
      rust: ${{ steps.decide.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-node/**'
      - name: Determine rust job necessity
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=${{ steps.filter.outputs.rust }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Lint (all events) ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Lint (prettier + eslint + stylelint + typecheck + knip)
        run: npm run lint

  # ── Security: Secret Detection (all events) ────────────────────────
  security:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="v8.30.0"
          EXPECTED_SHA="79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          echo "${EXPECTED_SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin -f gitleaks.tar.gz
          rm gitleaks.tar.gz
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  # ── Test (PR + workflow_call) ──────────────────────────────────────
  test:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_call'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Vitest
        run: npm run test

  # ── Rust: fmt + clippy + test + build smoke ────────────────────────
  rust:
    needs: [changes]
    if: |
      github.event_name == 'workflow_call' ||
      (github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Rust fmt check
        run: npm run rust:fmt

      - name: Build frontend (required for Rust compilation)
        run: npm run build

      - name: Clippy
        run: npm run rust:_clippy

      - name: Cargo test
        run: npm run rust:_test

      - name: Tauri build smoke test
        if: github.event_name == 'workflow_call'
        run: npm run tauri build -- --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

  # ── CI Gate ────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [lint, security, test, rust]
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all jobs passed
        env:
          EVENT: ${{ github.event_name }}
          LINT: ${{ needs.lint.result }}
          SECURITY: ${{ needs.security.result }}
          TEST: ${{ needs.test.result }}
          RUST: ${{ needs.rust.result }}
        run: |
          for r in "$LINT" "$SECURITY" "$TEST" "$RUST"; do
            [[ "$r" =~ ^(success|skipped)$ ]] || { echo "Failed: $r"; exit 1; }
          done
          # On workflow_call (release), test and rust must actually run
          if [[ "$EVENT" == "workflow_call" ]]; then
            [[ "$TEST" == "success" && "$RUST" == "success" ]] || \
              { echo "Release requires test and rust to pass (test=$TEST, rust=$RUST)"; exit 1; }
          fi
          echo "All checks passed."
