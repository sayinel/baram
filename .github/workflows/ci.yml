name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Path Filtering ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - '.node-version'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'eslint.config.*'
              - 'stylelint.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'knip.json'
            rust:
              - 'src-tauri/**'
              - 'package.json'
              - 'package-lock.json'
              - '.node-version'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.*'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            build:
              - 'src/**'
              - 'src-tauri/**'
              - 'index.html'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - '.node-version'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.*'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'

  # ── Frontend: Lint + Type Check ─────────────────────────────────
  lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Frontend lint suite
        run: npm run lint

  # ── Frontend: Test ──────────────────────────────────────────────
  test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Vitest
        run: npm run test

  # ── PR: Build Smoke Test (Ubuntu, no bundle) ───────────────────
  build-smoke:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Tauri smoke build
        run: npm run tauri build -- --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

  # ── Rust: Check + Test ──────────────────────────────────────────
  rust-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js (for frontend and Tauri build)
        uses: ./.github/actions/setup-node
      - name: Rust check suite
        run: npm run rust:check

  # ── Security: Secret Detection ──────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Main: Cross-Platform Build Matrix ───────────────────────────
  build-matrix:
    needs: [changes, lint, test, rust-check, security]
    if: >
      always() &&
      github.event_name == 'push' &&
      needs.changes.outputs.build == 'true' &&
      needs.security.result == 'success' &&
      contains(fromJSON('["success","skipped"]'), needs.lint.result) &&
      contains(fromJSON('["success","skipped"]'), needs.test.result) &&
      contains(fromJSON('["success","skipped"]'), needs.rust-check.result)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Tauri build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

  # ── CI Gate (single required check for branch protection) ───────
  ci-pass:
    if: always()
    needs:
      [changes, lint, test, build-smoke, rust-check, security, build-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        env:
          CHANGES: ${{ needs.changes.result }}
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          BUILD_SMOKE: ${{ needs.build-smoke.result }}
          RUST: ${{ needs.rust-check.result }}
          SEC: ${{ needs.security.result }}
          BUILD_MATRIX: ${{ needs.build-matrix.result }}
        run: |
          if [[ "$CHANGES" == "success" && \
                "$LINT" =~ ^(success|skipped)$ && \
                "$TEST" =~ ^(success|skipped)$ && \
                "$BUILD_SMOKE" =~ ^(success|skipped)$ && \
                "$RUST" =~ ^(success|skipped)$ && \
                "$SEC" =~ ^(success|skipped)$ && \
                "$BUILD_MATRIX" =~ ^(success|skipped)$ ]]; then
            echo "All checks passed or were skipped."
            exit 0
          else
            echo "One or more checks failed or were cancelled."
            echo "changes: $CHANGES"
            echo "lint: $LINT"
            echo "test: $TEST"
            echo "build-smoke: $BUILD_SMOKE"
            echo "rust-check: $RUST"
            echo "security: $SEC"
            echo "build-matrix: $BUILD_MATRIX"
            exit 1
          fi
