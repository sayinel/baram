name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TZ: Asia/Seoul

jobs:
  # ── Run full CI first ──────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      # Explicit signal for release-only CI steps — github.event_name inside
      # a called workflow is the caller's event, never 'workflow_call'.
      release: true
    permissions:
      contents: read
      pull-requests: read

  # ── Build on 3 platforms + create GitHub Release ───────────────────
  build-and-release:
    needs: [ci]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: Universal Binary (Apple Silicon + Intel) from a single dmg.
          # universal-apple-darwin requires both rust targets installed.
          - platform: macos-15
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-2022
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node

      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Baram v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
