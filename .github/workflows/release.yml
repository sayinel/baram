name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TZ: Asia/Seoul

jobs:
  # ── Tag integrity: fail fast before spending CI/build minutes ──────
  verify-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify tag matches app version and sits on main
        run: |
          fail() { echo "::error::$1"; exit 1; }
          TAG="${GITHUB_REF_NAME}"
          PKG="v$(node -p "require('./package.json').version")"
          [[ "$TAG" == "$PKG" ]] || fail "tag $TAG does not match package.json version $PKG"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main \
            || fail "tag commit $GITHUB_SHA is not on main"
          echo "Tag $TAG verified."

  # ── Run full CI ─────────────────────────────────────────────────────
  ci:
    needs: [verify-tag]
    uses: ./.github/workflows/ci.yml
    with:
      # Explicit signal for release-only CI steps — github.event_name inside
      # a called workflow is the caller's event, never 'workflow_call'.
      release: true
    permissions:
      contents: read
      pull-requests: read

  # ── Build on 3 platforms + create GitHub Release ───────────────────
  build-and-release:
    needs: [ci]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: Universal Binary (Apple Silicon + Intel) from a single dmg.
          # universal-apple-darwin requires both rust targets installed.
          - platform: macos-15
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux stays on the OLDEST supported runner on purpose: binaries
          # link against the build machine's glibc, so building on 22.04
          # keeps .deb/.AppImage running on older distros. Do not "modernize".
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-2025
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node

      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Pin must be a master-history SHA (release-branch SHAs can be GC'd);
      # the toolchain is selected via the input, not the ref name.
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Baram v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
