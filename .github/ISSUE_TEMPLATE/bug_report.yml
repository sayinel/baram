name: 🐛 Bug Report
description: Report a problem or unexpected behavior in Baram
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please search [existing issues](https://github.com/sayinel/baram/issues) first to avoid duplicates.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Type '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include a screenshot or screen recording if helpful.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Baram version
      description: See **Baram → About Baram**.
      placeholder: "e.g. 0.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - Windows (x64)
        - Linux (x64)
        - Other (specify in additional context)
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 14.5, Windows 11, Ubuntu 24.04"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, related markdown content, or anything else that helps.
