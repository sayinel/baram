# deny.toml — cargo-deny configuration
# Baram (Tauri 2.0 backend)
#
# Enforces license compliance and supply-chain hygiene.
# Install: cargo install cargo-deny   (or: brew install cargo-deny)
# Usage:   cargo deny check
# Docs:    https://embarkstudios.github.io/cargo-deny/

[advisories]
# Security advisories (RUSTSEC) are denied by default. Acknowledge specific
# advisories by adding their ID here. Vulnerability scanning is also covered by
# GitHub Dependabot.
ignore = []

[licenses]
# Baram is licensed under Apache-2.0 (permissive). Only permissive licenses are
# allowed — copyleft licenses (GPL / AGPL / …) are rejected by omission from
# this list, so a copyleft dependency will fail the check.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "0BSD",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # Mozilla root-certificate data bundle (webpki-roots), via reqwest/chromiumoxide
    "CDLA-Permissive-2.0",
    # Boost Software License (permissive, OSI/FSF approved), via arboard/clipboard-win
    "BSL-1.0",
    # bzip2 license (permissive, BSD-like), via zip/bzip2
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

[bans]
# Warn (do not fail) on multiple versions of the same crate.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io and workspace crates are allowed by default.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
